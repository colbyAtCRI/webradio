   <body>
      <center>
         <h1>Web Radio</h1>
         <div id="drawing" width=300 hight=300></div>
         <div id='cfg'></div>
      </center>

   <script>
      var control = new WebSocket('ws://localhost:8000',['control']);
      control.onmessage = (event) => {
        var cfg = JSON.parse(event.data);
        document.getElementById('cfg').innerHTML = tunerTable(cfg);
      };
      var draw = SVG("drawing").size(200,200);
      var circle = draw.circle(60,150,150).attr({fill:'red'});
   </script>
